<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriChain Pro Ultimate</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
transition:0.4s;
}

.light-mode{
background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
color:#222;
}

.navbar{
height:65px;
background:linear-gradient(135deg,#00c853,#009624);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.app{display:flex;}

.sidebar{
width:230px;
background:rgba(255,255,255,0.08);
min-height:calc(100vh - 65px);
padding-top:20px;
}

.sidebar button{
width:100%;
padding:14px 20px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.sidebar button:hover{
background:rgba(255,255,255,0.15);
}

.content{
flex:1;
padding:30px;
max-width:1100px;
}

.card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:18px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
outline:none;
}

button.primary{
background:linear-gradient(135deg,#00e676,#00c853);
color:white;
border:none;
padding:10px;
border-radius:10px;
margin-top:15px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button.primary:hover{
transform:scale(1.05);
}

.hidden{display:none;}

.summary-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.summary-card{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.risk-meter{
width:160px;
height:160px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
background:conic-gradient(#00e676 0deg,#444 0deg);
margin:auto;
transition:1s ease-in-out;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid #00e676;
border-radius:50%;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.clock{
font-size:14px;
margin-left:15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="card" style="max-width:400px;margin:150px auto;text-align:center;">
<h2>🌾 AgriChain Pro</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">

<div class="navbar">
<div>🌾 AgriChain Dashboard <span id="clock" class="clock"></span></div>
<div>
<button onclick="toggleTheme()">🌗</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="app">

<div class="sidebar">
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('advisor')">Smart Advisor</button>
<button onclick="showSection('harvest')">Harvest</button>
<button onclick="showSection('spoilage')">Spoilage</button>
</div>

<div class="content">

<!-- HOME -->
<div id="homeSection">
<div class="summary-grid">
<div class="summary-card" id="tempCard">🌡 Temp --</div>
<div class="summary-card" id="rainCard">🌧 Rain --</div>
<div class="summary-card" id="marketCard">📈 Market --</div>
<div class="summary-card" id="riskCard">⚠ Risk --</div>
</div>

<div class="card">
<h2>Welcome to AgriChain Pro</h2>
<p>AI-powered Agricultural Intelligence Platform</p>
</div>
</div>

<!-- ADVISOR -->
<div id="advisorSection" class="hidden">
<div class="card">
<h2>Smart Market Advisor</h2>
<input id="state" placeholder="State">
<input id="commodity" placeholder="Commodity">
<input id="market" placeholder="Market">
<input id="location" placeholder="Location">
<input id="quantity" placeholder="Quantity">
<button class="primary" onclick="runAdvisor()">Analyze</button>
<div id="advisorResult" class="hidden"></div>
</div>
</div>

<!-- HARVEST -->
<div id="harvestSection" class="hidden">
<div class="card">
<h2>Harvest Intelligence</h2>
<input id="harvestLocation" placeholder="Location">
<button class="primary" onclick="runHarvest()">Analyze</button>
<div id="harvestResult" class="hidden"></div>
<div class="risk-meter" id="riskMeter">
<span id="riskPercent">0%</span>
</div>
</div>
</div>

<!-- SPOILAGE -->
<div id="spoilageSection" class="hidden">
<div class="card">
<h2>Spoilage Risk</h2>
<select id="maxTemp">
<option value="25">25°C</option>
<option value="30">30°C</option>
<option value="35">35°C</option>
<option value="40">40°C</option>
</select>
<button class="primary" onclick="runSpoilage()">Analyze</button>
<div id="spoilageResult" class="hidden"></div>
</div>
</div>

</div>
</div>
</div>

<script>

let radarInstance=null;
let spoilageChartInstance=null;

function login(){
const u=document.getElementById("username").value;
const p=document.getElementById("password").value;
if(!u||!p){alert("Enter username & password");return;}
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("mainApp").classList.remove("hidden");
}

function logout(){
location.reload();
}

function toggleTheme(){
document.body.classList.toggle("light-mode");
}

setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString();
},1000);

function showSection(section){
["home","advisor","harvest","spoilage"].forEach(s=>{
document.getElementById(s+"Section").classList.add("hidden");
});
document.getElementById(section+"Section").classList.remove("hidden");
}

function runAdvisor(){
const result=document.getElementById("advisorResult");
result.classList.remove("hidden");
result.innerHTML="Advisor connected successfully.";
}

function runHarvest(){
const result=document.getElementById("harvestResult");
result.classList.remove("hidden");
result.innerHTML="Harvest analysis complete.";

let risk=60;
document.getElementById("riskMeter").style.background =
`conic-gradient(#00e676 ${risk*3.6}deg,#444 ${risk*3.6}deg)`;

document.getElementById("riskPercent").innerText=risk+"%";
}

function runSpoilage(){
const result=document.getElementById("spoilageResult");
result.classList.remove("hidden");
result.innerHTML="Spoilage scenarios analyzed.";
}

</script>
</body>
</html>
